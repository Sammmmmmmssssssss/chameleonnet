name: Go

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -v -race -count=1 -timeout=120s ./...

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true
      - name: Run benchmarks
        run: go test -bench=. -benchmem -benchtime=1x ./internal/...

  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true
      - name: Cross-compile
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          go build -ldflags="-s -w" -o "chameleon-$GOOS-$GOARCH$ext" ./cmd/chameleon/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chameleon-${{ matrix.os }}-${{ matrix.arch }}
          path: chameleon-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, bench, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: chameleon-*
          merge-multiple: true
      - name: Checksum
        run: sha256sum chameleon-* > checksums.txt
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chameleon-*
            checksums.txt
          generate_release_notes: true
